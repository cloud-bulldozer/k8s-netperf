---
tests:
  - TCPStream:
    parallelism: 1
    profile: "TCP_STREAM"
    duration: 10
    samples: 3
    messagesize: 1024

  - TCPStream2:
    parallelism: 1
    profile: "TCP_STREAM"
    duration: 10
    samples: 3
    messagesize: 8192

  - UDPStream:
    parallelism: 1
    profile: "UDP_STREAM"
    duration: 10
    samples: 3
    messagesize: 1024

  - CRR:
    parallelism: 1
    profile: "TCP_CRR"
    duration: 10
    samples: 3
    messagesize: 1024

  - CRRService:
    parallelism: 1
    profile: "TCP_CRR"
    duration: 10
    samples: 3
    messagesize: 1024
    service: True

  - RR:
    parallelism: 1
    profile: "TCP_RR"
    duration: 10
    samples: 3
    messagesize: 1024

  - TCPStreamLatency:
    parallelism: 1
    profile: "TCP_STREAM_LAT" # Only available with the uperf driver
    duration: 10
    samples: 3
    messagesize: 1024
    # messagereadsize: 1      # Optional: defaults to 1 byte if not specified
