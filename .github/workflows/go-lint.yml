name: Go-Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.25

    - uses: actions/checkout@v6

    - name: Install golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        install-only: true

    - name: Run Go verification
      run: make verify-go
